<figure class="illustration">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" style="max-width: 100%; margin: 1.5rem auto; display: block;">
    <defs>
        <linearGradient id="evalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#16a085;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="metricGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#16a085;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#e94560;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="700" height="450" fill="#faf8f5"/>
    
    <!-- Title -->
    <text x="350" y="30" text-anchor="middle" fill="#1a1a2e" font-family="Georgia, serif" font-size="16" font-weight="bold">Eval-First Development Framework</text>
    
    <!-- Central concept: EVAL -->
    <circle cx="350" cy="200" r="60" fill="url(#evalGrad)" filter="url(#shadow)"/>
    <text x="350" y="190" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="16" font-weight="bold">EVAL</text>
    <text x="350" y="210" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="10">Measure Quality</text>
    <text x="350" y="225" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="10">Before Building</text>
    
    <!-- Left side: Define Metrics -->
    <g transform="translate(50, 100)">
        <rect width="180" height="120" rx="10" fill="white" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
        <rect width="180" height="30" rx="10" ry="0" fill="#3498db"/>
        <rect y="20" width="180" height="10" fill="#3498db"/>
        <text x="90" y="18" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="11" font-weight="bold">Define Metrics</text>
        <text x="90" y="50" text-anchor="middle" fill="#1a1a2e" font-family="Georgia, serif" font-size="9" font-weight="bold">1. Quality Criteria</text>
        <text x="90" y="65" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">What does "good" look like?</text>
        <text x="90" y="80" text-anchor="middle" fill="#1a1a2e" font-family="Georgia, serif" font-size="9" font-weight="bold">2. Baseline Score</text>
        <text x="90" y="95" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">Current performance</text>
        <text x="90" y="110" text-anchor="middle" fill="#1a1a2e" font-family="Georgia, serif" font-size="9" font-weight="bold">3. Target Threshold</text>
        <text x="90" y="125" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">Acceptable minimum</text>
    </g>
    
    <!-- Right side: Measure -->
    <g transform="translate(470, 100)">
        <rect width="180" height="120" rx="10" fill="white" stroke="#16a085" stroke-width="2" filter="url(#shadow)"/>
        <rect width="180" height="30" rx="10" ry="0" fill="#16a085"/>
        <rect y="20" width="180" height="10" fill="#16a085"/>
        <text x="90" y="18" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="11" font-weight="bold">Measure</text>
        <text x="90" y="50" text-anchor="middle" fill="#1a1a2e" font-family="Georgia, serif" font-size="9" font-weight="bold">1. Automated Evals</text>
        <text x="90" y="65" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">Run tests at scale</text>
        <text x="90" y="80" text-anchor="middle" fill="#1a1a2e" font-family="Georgia, serif" font-size="9" font-weight="bold">2. LLM-as-Judge</text>
        <text x="90" y="95" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">AI evaluates AI output</text>
        <text x="90" y="110" text-anchor="middle" fill="#1a1a2e" font-family="Georgia, serif" font-size="9" font-weight="bold">3. Human Review</text>
        <text x="90" y="125" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">Spot-check samples</text>
    </g>
    
    <!-- Connecting lines -->
    <path d="M230,160 Q290,160 290,200" fill="none" stroke="#3498db" stroke-width="2" stroke-dasharray="4,2"/>
    <path d="M410,160 Q350,160 350,200" fill="none" stroke="#16a085" stroke-width="2" stroke-dasharray="4,2"/>
    
    <!-- Bottom: Iterate -->
    <g transform="translate(260, 310)">
        <rect width="180" height="100" rx="10" fill="white" stroke="#e94560" stroke-width="2" filter="url(#shadow)"/>
        <rect width="180" height="30" rx="10" ry="0" fill="#e94560"/>
        <rect y="20" width="180" height="10" fill="#e94560"/>
        <text x="90" y="18" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="11" font-weight="bold">Iterate</text>
        <text x="90" y="50" text-anchor="middle" fill="#1a1a2e" font-family="Georgia, serif" font-size="9" font-weight="bold">If Score &lt; Threshold:</text>
        <text x="90" y="65" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">Adjust prompt/model/params</text>
        <text x="90" y="80" text-anchor="middle" fill="#1a1a2e" font-family="Georgia, serif" font-size="9" font-weight="bold">If Score &gt;= Threshold:</text>
        <text x="90" y="95" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">Ship to production</text>
    </g>
    
    <!-- Arrows down from sides -->
    <path d="M140,225 L140,260 Q140,280 170,290" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
    <path d="M560,225 L560,260 Q560,280 530,290" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
    
    <!-- Loop arrow -->
    <path d="M260,360 Q350,400 440,360" fill="none" stroke="#e94560" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="350" y="395" text-anchor="middle" fill="#e94560" font-family="Georgia, serif" font-size="10">Continuous Improvement</text>
    
    <!-- Key insight box -->
    <rect x="200" y="80" width="300" height="30" rx="5" fill="#fef5f5" stroke="#e94560" stroke-width="1"/>
    <text x="350" y="100" text-anchor="middle" fill="#e94560" font-family="Georgia, serif" font-size="10">Key: Define "good" before building, not after</text>
  </svg>
  <figcaption style="text-align: center; font-style: italic; color: #666; margin-top: 0.5rem;">
    The eval-first development framework: Define metrics upfront, measure continuously, and iterate until quality thresholds are met before shipping.
  </figcaption>
</figure>