<figure class="illustration">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" style="max-width: 100%; margin: 1.5rem auto; display: block;">
    <defs>
        <linearGradient id="phase1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="phase2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#16a085;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="phase3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#16a085;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="phase4Grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="700" height="480" fill="#faf8f5"/>
    
    <!-- Title -->
    <text x="350" y="28" text-anchor="middle" fill="#1a1a2e" font-family="Georgia, serif" font-size="16" font-weight="bold">Vibe-to-Production Workflow</text>
    
    <!-- Phase 1: Discovery -->
    <g transform="translate(25, 50)">
        <rect width="150" height="130" rx="10" fill="url(#phase1Grad)" filter="url(#shadow)"/>
        <text x="75" y="25" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="13" font-weight="bold">PHASE 1</text>
        <text x="75" y="45" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="11">Discovery</text>
        <text x="75" y="70" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9">Define problem</text>
        <text x="75" y="85" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9">Set quality metrics</text>
        <text x="75" y="100" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9">Build eval criteria</text>
        <text x="75" y="115" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9">Vibe code prototype</text>
    </g>
    
    <!-- Arrow 1 -->
    <path d="M180,115 L210,115" fill="none" stroke="#1a1a2e" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Phase 2: Prototype -->
    <g transform="translate(215, 50)">
        <rect width="150" height="130" rx="10" fill="url(#phase2Grad)" filter="url(#shadow)"/>
        <text x="75" y="25" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="13" font-weight="bold">PHASE 2</text>
        <text x="75" y="45" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="11">Prototype</text>
        <text x="75" y="70" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9">Rapid iteration</text>
        <text x="75" y="85" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9">Run evals</text>
        <text x="75" y="100" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9">Tune prompts</text>
        <text x="75" y="115" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9">Validate approach</text>
    </g>
    
    <!-- Arrow 2 -->
    <path d="M370,115 L400,115" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    
    <!-- Phase 3: Production -->
    <g transform="translate(405, 50)">
        <rect width="150" height="130" rx="10" fill="url(#phase3Grad)" filter="url(#shadow)"/>
        <text x="75" y="25" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="13" font-weight="bold">PHASE 3</text>
        <text x="75" y="45" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="11">Production</text>
        <text x="75" y="70" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9">Build RAG/Agents</text>
        <text x="75" y="85" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9">Setup monitoring</text>
        <text x="75" y="100" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9">Add guardrails</text>
        <text x="75" y="115" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9">Deploy to scale</text>
    </g>
    
    <!-- Arrow 3 -->
    <path d="M560,115 L590,115" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    
    <!-- Phase 4: Iterate -->
    <g transform="translate(525, 50)">
        <rect width="150" height="130" rx="10" fill="url(#phase4Grad)" filter="url(#shadow)"/>
        <text x="75" y="25" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="13" font-weight="bold">PHASE 4</text>
        <text x="75" y="45" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="11">Iterate</text>
        <text x="75" y="70" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9">Monitor quality</text>
        <text x="75" y="85" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9">Collect feedback</text>
        <text x="75" y="100" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9">Update evals</text>
        <text x="75" y="115" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9">Ship improvements</text>
    </g>
    
    <!-- Role involvement matrix -->
    <rect x="25" y="200" width="650" height="250" rx="10" fill="white" stroke="#ddd" stroke-width="1"/>
    <text x="350" y="220" text-anchor="middle" fill="#1a1a2e" font-family="Georgia, serif" font-size="12" font-weight="bold">Role Involvement by Phase</text>
    
    <!-- Column headers -->
    <rect x="25" y="235" width="130" height="25" rx="5" fill="#f5f5f5"/>
    <text x="90" y="252" text-anchor="middle" fill="#1a1a2e" font-family="Georgia, serif" font-size="10" font-weight="bold">Role</text>
    
    <rect x="155" y="235" width="130" height="25" rx="5" fill="#fef5f5"/>
    <text x="220" y="252" text-anchor="middle" fill="#e94560" font-family="Georgia, serif" font-size="10" font-weight="bold">Discovery</text>
    
    <rect x="285" y="235" width="130" height="25" rx="5" fill="#fef9e7"/>
    <text x="350" y="252" text-anchor="middle" fill="#f39c12" font-family="Georgia, serif" font-size="10" font-weight="bold">Prototype</text>
    
    <rect x="415" y="235" width="130" height="25" rx="5" fill="#f0faf8"/>
    <text x="480" y="252" text-anchor="middle" fill="#16a085" font-family="Georgia, serif" font-size="10" font-weight="bold">Production</text>
    
    <rect x="545" y="235" width="130" height="25" rx="5" fill="#ebf5fb"/>
    <text x="610" y="252" text-anchor="middle" fill="#3498db" font-family="Georgia, serif" font-size="10" font-weight="bold">Iterate</text>
    
    <!-- Row 1: Vibe Coder -->
    <rect x="25" y="265" width="130" height="45" rx="5" fill="#fef5f5"/>
    <text x="90" y="283" text-anchor="middle" fill="#e94560" font-family="Georgia, serif" font-size="9" font-weight="bold">Vibe Coder</text>
    <text x="90" y="298" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">Rapid build</text>
    
    <rect x="155" y="265" width="130" height="45" rx="5" fill="#f8d7da"/>
    <text x="220" y="292" text-anchor="middle" fill="#e94560" font-family="Georgia, serif" font-size="14">HIGH</text>
    
    <rect x="285" y="265" width="130" height="45" rx="5" fill="#fff3cd"/>
    <text x="350" y="292" text-anchor="middle" fill="#f39c12" font-family="Georgia, serif" font-size="14">MED</text>
    
    <rect x="415" y="265" width="130" height="45" rx="5" fill="#d4edda"/>
    <text x="480" y="292" text-anchor="middle" fill="#16a085" font-family="Georgia, serif" font-size="14">LOW</text>
    
    <rect x="545" y="265" width="130" height="45" rx="5" fill="#d4edda"/>
    <text x="610" y="292" text-anchor="middle" fill="#16a085" font-family="Georgia, serif" font-size="14">MED</text>
    
    <!-- Row 2: AI PM -->
    <rect x="25" y="315" width="130" height="45" rx="5" fill="#fef9e7"/>
    <text x="90" y="333" text-anchor="middle" fill="#f39c12" font-family="Georgia, serif" font-size="9" font-weight="bold">AI PM</text>
    <text x="90" y="348" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">Strategy</text>
    
    <rect x="155" y="315" width="130" height="45" rx="5" fill="#fff3cd"/>
    <text x="220" y="342" text-anchor="middle" fill="#f39c12" font-family="Georgia, serif" font-size="14">MED</text>
    
    <rect x="285" y="315" width="130" height="45" rx="5" fill="#f8d7da"/>
    <text x="350" y="342" text-anchor="middle" fill="#e94560" font-family="Georgia, serif" font-size="14">HIGH</text>
    
    <rect x="415" y="315" width="130" height="45" rx="5" fill="#fff3cd"/>
    <text x="480" y="342" text-anchor="middle" fill="#f39c12" font-family="Georgia, serif" font-size="14">MED</text>
    
    <rect x="545" y="315" width="130" height="45" rx="5" fill="#f8d7da"/>
    <text x="610" y="342" text-anchor="middle" fill="#e94560" font-family="Georgia, serif" font-size="14">HIGH</text>
    
    <!-- Row 3: AI Engineer -->
    <rect x="25" y="365" width="130" height="45" rx="5" fill="#f0faf8"/>
    <text x="90" y="383" text-anchor="middle" fill="#16a085" font-family="Georgia, serif" font-size="9" font-weight="bold">AI Engineer</text>
    <text x="90" y="398" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">Infrastructure</text>
    
    <rect x="155" y="365" width="130" height="45" rx="5" fill="#d4edda"/>
    <text x="220" y="392" text-anchor="middle" fill="#16a085" font-family="Georgia, serif" font-size="14">LOW</text>
    
    <rect x="285" y="365" width="130" height="45" rx="5" fill="#fff3cd"/>
    <text x="350" y="392" text-anchor="middle" fill="#f39c12" font-family="Georgia, serif" font-size="14">MED</text>
    
    <rect x="415" y="365" width="130" height="45" rx="5" fill="#f8d7da"/>
    <text x="480" y="392" text-anchor="middle" fill="#e94560" font-family="Georgia, serif" font-size="14">HIGH</text>
    
    <rect x="545" y="365" width="130" height="45" rx="5" fill="#fff3cd"/>
    <text x="610" y="392" text-anchor="middle" fill="#f39c12" font-family="Georgia, serif" font-size="14">MED</text>
  </svg>
  <figcaption style="text-align: center; font-style: italic; color: #666; margin-top: 0.5rem;">
    The vibe-to-production workflow moves through four phases, with different roles leading at each stage. Vibe Coders drive rapid prototyping, AI PMs guide quality and strategy, and AI Engineers build production systems.
  </figcaption>
</figure>