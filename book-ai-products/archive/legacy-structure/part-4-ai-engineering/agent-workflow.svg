<figure class="illustration">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" style="max-width: 100%; margin: 1.5rem auto; display: block;">
    <defs>
        <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#16a085;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="toolGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
        </filter>
    </defs>
    
    <rect width="700" height="420" fill="#faf8f5"/>
    
    <text x="350" y="26" text-anchor="middle" fill="#1a1a2e" font-family="Georgia, serif" font-size="15" font-weight="bold">Agent Workflow Pattern</text>
    
    <!-- User Query -->
    <g transform="translate(280, 45)">
        <rect width="140" height="45" rx="22" fill="#1a1a2e" filter="url(#shadow)"/>
        <text x="70" y="20" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="10" font-weight="bold">User Query</text>
        <text x="70" y="35" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="8">Complex task</text>
    </g>
    
    <!-- Arrow to Agent -->
    <path d="M350,95 L350,120" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    
    <!-- Agent Core -->
    <g transform="translate(240, 125)">
        <rect width="220" height="55" rx="10" fill="url(#agentGrad)" filter="url(#shadow)"/>
        <text x="110" y="25" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="12" font-weight="bold">LLM Agent</text>
        <text x="110" y="42" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9">Reasoning + Decision + Action</text>
    </g>
    
    <!-- Arrow down from agent -->
    <path d="M350,185 L350,205" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    
    <!-- Decision diamond -->
    <g transform="translate(300, 205)">
        <polygon points="50,0 100,30 50,60 0,30" fill="#f39c12" filter="url(#shadow)"/>
        <text x="50" y="28" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9" font-weight="bold">Decide</text>
    </g>
    
    <!-- Three paths from decision -->
    <path d="M250,235 L100,235 L100,265" fill="none" stroke="#16a085" stroke-width="2"/>
    <path d="M350,270 L350,300" fill="none" stroke="#3498db" stroke-width="2"/>
    <path d="M450,235 L600,235 L600,265" fill="none" stroke="#e94560" stroke-width="2"/>
    
    <!-- Tool 1: Search -->
    <g transform="translate(25, 270)">
        <rect width="150" height="60" rx="8" fill="url(#toolGrad)" filter="url(#shadow)"/>
        <text x="75" y="25" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="10" font-weight="bold">Tool: Search</text>
        <text x="75" y="42" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="8">Web, API, Database</text>
    </g>
    
    <!-- Tool 2: Code -->
    <g transform="translate(275, 305)">
        <rect width="150" height="60" rx="8" fill="url(#toolGrad)" filter="url(#shadow)"/>
        <text x="75" y="25" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="10" font-weight="bold">Tool: Code</text>
        <text x="75" y="42" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="8">Execute, Calculate</text>
    </g>
    
    <!-- Tool 3: Memory -->
    <g transform="translate(525, 270)">
        <rect width="150" height="60" rx="8" fill="url(#toolGrad)" filter="url(#shadow)"/>
        <text x="75" y="25" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="10" font-weight="bold">Tool: Memory</text>
        <text x="75" y="42" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="8">Read, Write Context</text>
    </g>
    
    <!-- Arrows back from tools -->
    <path d="M100,335 L100,365 L300,365 L300,345" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="4,2"/>
    <path d="M350,370 L350,370" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="4,2"/>
    <path d="M600,335 L600,365 L400,365 L400,345" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="4,2"/>
    
    <!-- Response back to user -->
    <path d="M300,345 L240,345 L240,380 L65,380" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    <path d="M400,345 L460,345 L460,380 L635,380" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    
    <!-- Annotations -->
    <rect x="185" y="280" width="130" height="35" rx="5" fill="#f0faf8" stroke="#16a085" stroke-width="1"/>
    <text x="250" y="298" text-anchor="middle" fill="#16a085" font-family="Georgia, serif" font-size="9">Multi-step reasoning</text>
    <text x="250" y="310" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">ReAct, chain-of-thought</text>
    
    <rect x="385" y="280" width="130" height="35" rx="5" fill="#ebf5fb" stroke="#3498db" stroke-width="1"/>
    <text x="450" y="298" text-anchor="middle" fill="#3498db" font-family="Georgia, serif" font-size="9">Loop until done</text>
    <text x="450" y="310" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">Max iterations guard</text>
    
    <text x="100" y="405" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">Tool Result 1</text>
    <text x="350" y="405" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">Tool Result 2</text>
    <text x="600" y="405" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">Tool Result 3</text>
  </svg>
  <figcaption style="text-align: center; font-style: italic; color: #666; margin-top: 0.5rem;">
    Agent workflow: The LLM agent receives a complex task, decides which tools to use (search, code, memory), executes them in a loop, and returns a synthesized response to the user.
  </figcaption>
</figure>