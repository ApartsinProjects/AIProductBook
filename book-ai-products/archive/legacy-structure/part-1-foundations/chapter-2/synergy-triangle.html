<figure class="illustration">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" style="max-width: 100%; margin: 1.5rem auto; display: block;">
    <defs>
        <linearGradient id="vibeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#16a085;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="pmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#16a085;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="engGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#e94560;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="600" height="500" fill="#faf8f5"/>
    
    <!-- Triangle sides (connecting lines) -->
    <polygon points="300,60 100,420 500,420" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="8,4" opacity="0.3"/>
    
    <!-- Vibe Coding vertex (top) -->
    <circle cx="300" cy="60" r="45" fill="url(#vibeGrad)" filter="url(#shadow)"/>
    <text x="300" y="55" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="11" font-weight="bold">VIBE</text>
    <text x="300" y="70" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="11" font-weight="bold">CODING</text>
    
    <!-- AI PM vertex (bottom left) -->
    <circle cx="100" cy="420" r="45" fill="url(#pmGrad)" filter="url(#shadow)"/>
    <text x="100" y="415" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="11" font-weight="bold">AI PM</text>
    <text x="100" y="430" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="10">(Strategy)</text>
    
    <!-- AI Engineering vertex (bottom right) -->
    <circle cx="500" cy="420" r="45" fill="url(#engGrad)" filter="url(#shadow)"/>
    <text x="500" y="415" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="11" font-weight="bold">AI</text>
    <text x="500" y="430" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="11" font-weight="bold">ENGINEERING</text>
    
    <!-- Center label -->
    <circle cx="300" cy="265" r="55" fill="white" stroke="#1a1a2e" stroke-width="2"/>
    <text x="300" y="255" text-anchor="middle" fill="#1a1a2e" font-family="Georgia, serif" font-size="14" font-weight="bold">SUCCESS</text>
    <text x="300" y="275" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="10">(Balance)</text>
    
    <!-- Arrows and labels -->
    <!-- Arrow: Vibe -> PM (left side) -->
    <path d="M250,95 Q175,200 125,375" fill="none" stroke="#e94560" stroke-width="2" marker-end="url(#arrowRed)"/>
    <text x="160" y="220" fill="#e94560" font-family="Georgia, serif" font-size="10" transform="rotate(-55, 160, 220)">Test Fast</text>
    
    <!-- Arrow: PM -> Engineering (bottom) -->
    <path d="M145,420 L455,420" fill="none" stroke="#16a085" stroke-width="2" marker-end="url(#arrowTeal)"/>
    <text x="300" y="460" text-anchor="middle" fill="#16a085" font-family="Georgia, serif" font-size="10">Define Quality</text>
    
    <!-- Arrow: Engineering -> Vibe (right side) -->
    <path d="M455,375 Q425,200 350,95" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    <text x="420" y="220" fill="#1a1a2e" font-family="Georgia, serif" font-size="10" transform="rotate(55, 420, 220)">Ship</text>
    
    <!-- Feedback loop indicators -->
    <path d="M180,350 Q300,480 420,350" fill="none" stroke="#666" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="300" y="455" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="9">Feedback Loop</text>
    
    <!-- Key text boxes -->
    <rect x="50" y="130" width="120" height="60" rx="8" fill="#fff5f5" stroke="#e94560" stroke-width="1"/>
    <text x="110" y="150" text-anchor="middle" fill="#e94560" font-family="Georgia, serif" font-size="9" font-weight="bold">Rapid Prototyping</text>
    <text x="110" y="165" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">Hours not weeks</text>
    <text x="110" y="180" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">Hypothesis testing</text>
    
    <rect x="430" y="130" width="120" height="60" rx="8" fill="#f0faf8" stroke="#16a085" stroke-width="1"/>
    <text x="490" y="150" text-anchor="middle" fill="#16a085" font-family="Georgia, serif" font-size="9" font-weight="bold">Reliable Scale</text>
    <text x="490" y="165" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">Production systems</text>
    <text x="490" y="180" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">LLMOps, RAG, Agents</text>
  </svg>
  <figcaption>
    The Synergy Triangle: Three pillars that must work together for AI product success. Vibe Coding enables rapid hypothesis testing, AI PM defines quality metrics, and AI Engineering ships reliable systems.
  </figcaption>
</figure>
