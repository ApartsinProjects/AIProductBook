<figure class="illustration">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" style="max-width: 100%; margin: 1.5rem auto; display: block;">
    <defs>
        <linearGradient id="queryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="retrieveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#16a085;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="generateGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#16a085;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="700" height="420" fill="#faf8f5"/>
    
    <!-- Title -->
    <text x="350" y="28" text-anchor="middle" fill="#1a1a2e" font-family="Georgia, serif" font-size="16" font-weight="bold">RAG System Architecture</text>
    
    <!-- User Query -->
    <g transform="translate(280, 50)">
        <rect width="140" height="50" rx="25" fill="url(#queryGrad)" filter="url(#shadow)"/>
        <text x="70" y="25" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="12" font-weight="bold">User Query</text>
        <text x="70" y="42" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9">"What is X?"</text>
    </g>
    
    <!-- Arrow: Query to Embedding -->
    <path d="M350,105 L350,135" fill="none" stroke="#1a1a2e" stroke-width="2" marker-end="url(#arrow)"/>
    
    <!-- Embedding Model -->
    <g transform="translate(260, 140)">
        <rect width="180" height="45" rx="8" fill="#f39c12" filter="url(#shadow)"/>
        <text x="90" y="28" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="11" font-weight="bold">Embedding Model</text>
    </g>
    
    <!-- Arrow: Embedding to Vector DB -->
    <path d="M350,190 L350,220" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    <text x="365" y="208" fill="#666" font-family="Georgia, serif" font-size="9">vector</text>
    
    <!-- Vector Database -->
    <g transform="translate(250, 225)">
        <ellipse cx="100" cy="35" rx="120" ry="50" fill="#16a085" filter="url(#shadow)"/>
        <text x="100" y="25" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="11" font-weight="bold">Vector Database</text>
        <text x="100" y="42" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9">Pinecone, Weaviate, Chroma</text>
    </g>
    
    <!-- Retrieved Context -->
    <path d="M250,280 Q200,280 200,300 Q200,320 140,330" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    <path d="M350,280 L350,310" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    <path d="M450,280 Q500,280 500,300 Q500,320 560,330" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    
    <text x="140" y="300" fill="#666" font-family="Georgia, serif" font-size="9">top-k chunks</text>
    <text x="560" y="300" fill="#666" font-family="Georgia, serif" font-size="9">top-k chunks</text>
    
    <!-- Retrieved Documents -->
    <g transform="translate(30, 335)">
        <rect width="150" height="60" rx="8" fill="white" stroke="#16a085" stroke-width="2"/>
        <text x="75" y="25" text-anchor="middle" fill="#16a085" font-family="Georgia, serif" font-size="10" font-weight="bold">Retrieved</text>
        <text x="75" y="40" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">Context Chunk 1</text>
        <text x="75" y="52" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">Context Chunk 2</text>
    </g>
    
    <!-- Arrow to LLM -->
    <path d="M180,365 L260,365" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="4,2"/>
    <path d="M520,365 L440,365" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="4,2"/>
    
    <!-- LLM (center) -->
    <g transform="translate(260, 335)">
        <rect width="180" height="60" rx="10" fill="url(#generateGrad)" filter="url(#shadow)"/>
        <text x="90" y="25" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="12" font-weight="bold">LLM</text>
        <text x="90" y="42" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="9">Claude, GPT-4, Llama</text>
    </g>
    
    <!-- Final Response -->
    <path d="M350,400 L350,400" fill="none" stroke="#1a1a2e" stroke-width="2"/>
    <g transform="translate(260, 400)">
        <rect width="180" height="0" rx="0" fill="none"/>
    </g>
    
    <!-- Arrow down to response -->
    <path d="M350,400 L350,400" fill="none"/>
    
    <!-- Side annotations -->
    <rect x="30" y="150" width="150" height="70" rx="6" fill="#fef5f5" stroke="#e94560" stroke-width="1"/>
    <text x="105" y="170" text-anchor="middle" fill="#e94560" font-family="Georgia, serif" font-size="9" font-weight="bold">Chunking Strategy</text>
    <text x="105" y="185" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">Split documents into</text>
    <text x="105" y="198" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">searchable pieces</text>
    <text x="105" y="211" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">512-1024 tokens</text>
    
    <rect x="520" y="150" width="150" height="70" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
    <text x="595" y="170" text-anchor="middle" fill="#f39c12" font-family="Georgia, serif" font-size="9" font-weight="bold">Hybrid Search</text>
    <text x="595" y="185" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">Vector + Keyword</text>
    <text x="595" y="198" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">BM25 + cosine</text>
    <text x="595" y="211" text-anchor="middle" fill="#666" font-family="Georgia, serif" font-size="8">similarity</text>
  </svg>
  <figcaption style="text-align: center; font-style: italic; color: #666; margin-top: 0.5rem;">
    RAG architecture: User queries are embedded, matched against a vector database, and the top-k relevant chunks are combined with the original query to generate accurate, context-grounded responses.
  </figcaption>
</figure>